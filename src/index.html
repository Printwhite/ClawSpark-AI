<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawSpark AI 极速安装器</title>
<style>
:root{--bg:#f5f8ff;--surface:#fff;--surface-soft:#f6faff;--line:#dde7fb;--line2:#cdd9f2;--text:#18253d;--muted:#5e7091;--dim:#879ab7;--brand:#1668ff;--brand-dark:#1454cf;--brand-soft:#eaf2ff;--accent:#f4435a;--ok:#11a668;--warn:#d98a00;--bad:#e5484d;--r:14px;--shadow:0 10px 28px rgba(24,42,75,.08);--sans:"PingFang SC","HarmonyOS Sans SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;--mono:"Consolas","JetBrains Mono","Courier New",monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;overflow:hidden;font-family:var(--sans);color:var(--text);background:radial-gradient(circle at 8% 6%,rgba(43,108,255,.13),transparent 28%),radial-gradient(circle at 92% 10%,rgba(242,85,107,.1),transparent 24%),var(--bg);display:flex;flex-direction:column}
.titlebar{height:38px;display:flex;align-items:center;padding:0 12px;background:rgba(255,255,255,.95);border-bottom:1px solid var(--line);-webkit-app-region:drag;backdrop-filter:blur(8px);flex-shrink:0}
.titlebar-left{display:flex;align-items:center;gap:8px}.logo-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(125deg,var(--brand),var(--accent));box-shadow:0 0 12px rgba(43,108,255,.45)}.titlebar-text{font-size:12px;color:#4a5c72;font-weight:600}
.window-actions{margin-left:auto;display:flex;gap:8px;-webkit-app-region:no-drag}.window-btn{width:12px;height:12px;border:none;border-radius:50%;cursor:pointer;opacity:.85}.window-btn:hover{opacity:1}.window-btn.min{background:#ffc653}.window-btn.max{background:#43c884}.window-btn.close{background:#f56a6a}
.app{flex:1;display:flex;flex-direction:column;min-height:0}
.header{padding:16px 24px 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.86);backdrop-filter:blur(8px);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}.brand-name{font-size:17px;font-weight:700}.badge{font-size:11px;color:#58708c;padding:2px 9px;border-radius:999px;border:1px solid var(--line2);background:#fbfdff}
.steps{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.step{min-width:30px;height:26px;padding:0 8px;border-radius:999px;border:1px solid var(--line2);color:var(--dim);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}.step.active{color:var(--brand-dark);background:var(--brand-soft);border-color:#b9ccff}.step.done{color:var(--ok);background:#e8f8f0;border-color:#b8e8cd}
.main{flex:1;min-height:0;overflow:auto;padding:22px}.page{max-width:920px;margin:0 auto;animation:fadeUp .18s ease}@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}
.hero{display:grid;grid-template-columns:1.3fr .9fr;gap:14px}.hero h2{font-size:30px;line-height:1.12;letter-spacing:-.5px;margin-bottom:10px}.hero p{font-size:14px;color:var(--muted);line-height:1.72}
.hero-box{border:1px solid #d5e2ff;background:linear-gradient(140deg,#edf3ff,#fff3f6);border-radius:12px;padding:16px}.hero-box .label{font-size:12px;color:#6580a6}.hero-box b{display:block;font-size:18px;margin:6px 0}
.title{font-size:23px;font-weight:700;margin-bottom:6px}.sub{font-size:14px;color:var(--muted);line-height:1.65}
.grid{display:grid;gap:10px;margin-top:12px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.card{background:var(--surface-soft);border:1px solid var(--line);border-radius:11px;padding:12px}.card.clickable{cursor:pointer}.card.clickable:hover{border-color:#c2d4ef}.card.selected{border-color:#8cb0ff;box-shadow:0 0 0 1px #d0e0ff}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.k{font-size:14px;font-weight:600}.v{margin-top:3px;font-size:12px;color:var(--muted);font-family:var(--mono);word-break:break-all}.hint{margin-top:3px;font-size:12px;color:var(--dim)}
.tag{padding:2px 8px;border-radius:999px;border:1px solid #d6deea;font-size:10px;color:#5e738b}.tag.recommend{border-color:#b9ccff;background:#eaf1ff;color:#2a58c4}.tag.custom{border-color:#ffd2da;background:#fff0f3;color:#b13d51}
.check-item{display:flex;align-items:center;gap:10px}.status{width:26px;height:26px;border-radius:8px;border:1px solid;display:grid;place-items:center;font-size:10px;font-weight:700}.status.pass{border-color:#bfe9cf;background:#ebf8f1;color:var(--ok)}.status.warn{border-color:#f3daab;background:#fff8eb;color:var(--warn)}.status.fail{border-color:#f0b9bc;background:#fff1f2;color:var(--bad)}
.input-wrap{display:flex;align-items:center;gap:8px;border:1px solid var(--line2);background:#fff;border-radius:9px;padding:10px}.input-wrap input,.input-wrap select{flex:1;border:none;outline:none;font-size:13px;color:var(--text);background:none;font-family:var(--sans)}.input-wrap input.mono{font-family:var(--mono)}
.tiny-btn{border:1px solid var(--line2);border-radius:8px;background:#fff;color:#425973;padding:4px 8px;font-size:11px;cursor:pointer}.tiny-btn:hover{border-color:#b8cbe6}
.key-status{margin-top:8px;min-height:16px;font-size:12px;color:var(--muted)}.key-status.pass{color:var(--ok)}.key-status.fail{color:var(--bad)}.key-status.loading{color:var(--muted)}
.progress-row{margin-top:10px;display:flex;align-items:center;gap:10px}.track{flex:1;height:8px;border-radius:999px;background:#e6edf7;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--accent));transition:width .2s}.percent{min-width:42px;text-align:right;font-size:12px;color:#6f8199;font-family:var(--mono)}
.terminal{margin-top:12px;max-height:300px;overflow:auto;border:1px solid #d7e1ef;background:#f8fbff;border-radius:10px;padding:10px;font-family:var(--mono);font-size:12px;line-height:1.6}.line{display:grid;grid-template-columns:64px 28px 1fr;gap:7px;margin-bottom:2px}.time{color:#8ea0b3}.prefix{color:#5f7fb4}.txt.info{color:#3f5163}.txt.success{color:var(--ok)}.txt.warn{color:var(--warn)}.txt.error{color:var(--bad)}
.ok-mark{width:74px;height:74px;margin:0 auto 14px;border-radius:20px;display:grid;place-items:center;font-size:30px;font-weight:800;color:var(--ok);border:1px solid #bce8ce;background:#ecf9f2}
.actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:16px}.btn{border:none;border-radius:10px;padding:10px 16px;font:600 14px var(--sans);cursor:pointer}.btn:disabled{opacity:.45;cursor:not-allowed}.btn-primary{color:#fff;background:linear-gradient(120deg,var(--brand),var(--accent));box-shadow:0 8px 20px rgba(43,108,255,.22)}.btn-ghost{color:#385069;background:#fff;border:1px solid var(--line2)}
.footer{padding:11px 22px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.86);flex-shrink:0}.footer-note{font-size:11px;color:var(--dim)}.footer-progress{width:220px;height:4px;border-radius:999px;background:#e3ebf6;overflow:hidden}.footer-progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--accent));transition:width .25s}
@media (max-width:980px){.header{flex-direction:column;align-items:flex-start}.steps{justify-content:flex-start}.hero{grid-template-columns:1fr}.g3{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:640px){.main{padding:12px}.header,.footer{padding:12px}.g2,.g3{grid-template-columns:1fr}.actions{flex-wrap:wrap}.actions .btn{width:100%}}
</style>
</head>
<body>
<div class="titlebar">
  <div class="titlebar-left"><span class="logo-dot"></span><span class="titlebar-text">ClawSpark AI 极速安装器</span></div>
  <div class="window-actions">
    <button class="window-btn min" onclick="window.electronAPI&&window.electronAPI.minimize()"></button>
    <button class="window-btn max" onclick="window.electronAPI&&window.electronAPI.maximize()"></button>
    <button class="window-btn close" onclick="window.electronAPI&&window.electronAPI.close()"></button>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="brand"><span class="brand-name">ClawSpark AI 极速安装器</span><span class="badge">v3.3</span></div>
    <div class="steps" id="steps"></div>
  </div>
  <div class="main"><div id="page"></div></div>
  <div class="footer">
    <span class="footer-note">仅在本机安装，API Key 保存在 <code>~/.openclaw/.env</code>。</span>
    <div class="footer-progress"><div id="globalProgress"></div></div>
  </div>
</div>

<script>
const DASHBOARD_URL = "http://127.0.0.1:18789";
const STEPS = [
  { id: "welcome", name: "欢迎" },
  { id: "env", name: "环境检测" },
  { id: "providers", name: "模型选择" },
  { id: "keys", name: "密钥配置" },
  { id: "channels", name: "渠道配置" },
  { id: "install", name: "开始安装" },
  { id: "done", name: "安装完成" },
];

const BUILTIN_PROVIDERS = [
  { id: "deepseek", name: "DeepSeek", desc: "高性价比聊天与推理模型。", cost: "成本低", keyUrl: "https://platform.deepseek.com/api_keys", placeholder: "sk-xxxxxxxxxxxxxxxx", recommended: true, noKey: false, api: "openai-completions", baseUrl: "https://api.deepseek.com", modelId: "deepseek-chat" },
  { id: "anthropic", name: "Anthropic Claude", desc: "代码与工具调用能力强。", cost: "成本中等", keyUrl: "https://console.anthropic.com", placeholder: "sk-ant-xxxxxxxxxxxxxxxx", recommended: true, noKey: false, api: "anthropic", modelId: "claude-sonnet-4-20250514" },
  { id: "openai", name: "OpenAI", desc: "生态完整，API 稳定。", cost: "成本中等", keyUrl: "https://platform.openai.com/api-keys", placeholder: "sk-proj-xxxxxxxxxxxxxxxx", recommended: false, noKey: false, api: "openai-completions", baseUrl: "https://api.openai.com/v1", modelId: "gpt-4o" },
  { id: "google", name: "Google Gemini", desc: "多模态响应快，上下文长。", cost: "成本中等", keyUrl: "https://aistudio.google.com/apikey", placeholder: "AIzaSyxxxxxxxxxxxxxxxx", recommended: false, noKey: false, api: "google-gemini", modelId: "gemini-2.5-pro" },
  { id: "openrouter", name: "OpenRouter", desc: "一个 Key 对接多个供应商。", cost: "按量计费", keyUrl: "https://openrouter.ai/keys", placeholder: "sk-or-v1-xxxxxxxxxxxxxxxx", recommended: false, noKey: false, api: "openai-completions", baseUrl: "https://openrouter.ai/api/v1", modelId: "auto" },
  { id: "ollama", name: "Ollama（本地）", desc: "无需云端密钥，本地运行。", cost: "免费 / 依赖本机算力", keyUrl: "https://ollama.com/download", placeholder: "", recommended: false, noKey: true, api: "openai-completions", baseUrl: "http://localhost:11434/v1", modelId: "llama3:8b" },
];

const CHANNELS = [
  { id: "webchat", name: "Web 控制台", desc: "内置在 18789 端口网关。", lock: true },
  { id: "whatsapp", name: "WhatsApp", desc: "安装后可扫码绑定。", lock: false },
  { id: "telegram", name: "Telegram", desc: "需要 Bot Token。", lock: false },
  { id: "discord", name: "Discord", desc: "需要 Bot Token。", lock: false },
  { id: "slack", name: "Slack", desc: "适合团队通知场景。", lock: false },
  { id: "wechat", name: "WeChat", desc: "社区插件方式接入。", lock: false },
];

const state = {
  step: 0,
  envChecks: [],
  envLoading: false,
  selectedProviders: ["deepseek"],
  customProviders: [],
  showCustomForm: false,
  customDraft: { name: "", baseUrl: "", modelId: "", modelName: "", api: "openai-completions", envName: "", contextWindow: "128000", maxTokens: "8192", reasoning: false },
  apiKeys: {},
  keyValidation: {},
  selectedChannels: ["webchat"],
  installLogs: [],
  installProgress: 0,
  installRunning: false,
  installDone: false,
  uninstallLogs: [],
  uninstallRunning: false,
  uninstallDone: false,
  uninstallError: "",
};

function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;")}
function now(){const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function clamp(v){return Math.max(0,Math.min(100,v))}
function openUrl(url){if(window.electronAPI?.openExternal)window.electronAPI.openExternal(url);else window.open(url,"_blank")}
function isInstallStep(){return STEPS[state.step].id==="install"}
function isDoneStep(){return STEPS[state.step].id==="done"}
function lineHtml(l){return `<div class="line"><span class="time">${esc(l.time||"")}</span><span class="prefix">${esc(l.prefix||">")}</span><span class="txt ${esc(l.type||"info")}">${esc(l.text||"")}</span></div>`}
function allProviders(){return [...BUILTIN_PROVIDERS,...state.customProviders]}
function providerById(id){return allProviders().find(p=>p.id===id)}
function selectedCustomProviders(){const m=new Set(state.selectedProviders);return state.customProviders.filter(p=>m.has(p.id))}
function render(){
  document.getElementById("steps").innerHTML=STEPS.map((step,i)=>`<span class="step ${i<state.step?"done":i===state.step?"active":""}" title="${esc(step.name)}">${i<state.step?"完成":i+1}</span>`).join("");
  document.getElementById("globalProgress").style.width=`${Math.round(((state.step+1)/STEPS.length)*100)}%`;
  const currentId=STEPS[state.step].id;
  document.getElementById("page").innerHTML=`<div class="page">${renderPage(currentId)}</div>`;
  if(currentId==="env"&&!state.envLoading&&state.envChecks.length===0)checkEnv();
  if(currentId==="install"){renderInstallFromState();updateInstallProgressUI();updateInstallActionUI();startInstall();}
  if(currentId==="done"){renderUninstallFromState();updateUninstallActionUI();}
}

function renderPage(id){
  if(id==="welcome")return renderWelcome();
  if(id==="env")return renderEnv();
  if(id==="providers")return renderProviders();
  if(id==="keys")return renderKeys();
  if(id==="channels")return renderChannels();
  if(id==="install")return renderInstallPage();
  return renderDone();
}

function renderWelcome(){
  return `<div class="panel hero"><div><h2>三分钟完成 OpenClaw 安装。</h2><p>安装器会自动检测运行环境、配置模型供应商，并启动 <code>${DASHBOARD_URL}</code> 本地网关。内置镜像和重试策略，适配无 VPN 网络。</p><div class="actions"><span class="hint">安装器不会上传你的本地数据。</span><button class="btn btn-primary" onclick="goStep(1)">开始配置</button></div></div><div class="hero-box"><span class="label">安装目标</span><b>CLI + 本地网关 + 初始配置</b><span class="sub">配置文件写入 <code>~/.openclaw</code>。</span></div></div>`;
}

function renderEnv(){
  const rows=state.envLoading
    ? `<div class="card check-item"><span class="status warn">...</span><div><div class="k">正在检测</div><div class="v">正在检查系统环境...</div></div></div>`
    : state.envChecks.map(item=>`<div class="card check-item"><span class="status ${item.status}">${item.status==="pass"?"通过":item.status==="warn"?"警告":"失败"}</span><div><div class="k">${esc(item.name)}</div><div class="v">${esc(item.detail||"")}</div>${item.hint?`<div class="hint">${esc(item.hint)}</div>`:""}</div></div>`).join("");
  const canNext=state.envChecks.length>0&&!state.envLoading&&!state.envChecks.some(x=>x.status==="fail");
  return `<div class="panel"><div class="title">环境检测</div><p class="sub">安装前检查 Node.js、npm、磁盘空间和 npm registry 连通性。</p><div class="grid">${rows}</div><div class="actions"><button class="btn btn-ghost" onclick="checkEnv(true)">重新检测</button><div><button class="btn btn-ghost" onclick="goStep(0)">上一步</button> <button class="btn btn-primary" onclick="goStep(2)" ${canNext?"":"disabled"}>下一步</button></div></div></div>`;
}

function renderProviders(){
  const cards=allProviders().map(p=>{
    const selected=state.selectedProviders.includes(p.id);
    return `<div class="card clickable ${selected?"selected":""}" onclick="toggleProvider('${p.id}')"><div class="row"><span class="k">${esc(p.name)}</span><span class="tag ${p.isCustom?"custom":p.recommended?"recommend":""}">${p.isCustom?"自定义":p.recommended?"推荐":"可选"}</span></div><div class="sub">${esc(p.desc||"自定义供应商")}</div><div class="hint">${esc(p.cost||"")}</div>${p.isCustom?`<div class="actions" style="margin-top:8px"><span class="hint">ID: ${esc(p.id)}</span><button class="tiny-btn" onclick="event.stopPropagation();removeCustomProvider('${p.id}')">删除</button></div>`:""}</div>`;
  }).join("");

  const d=state.customDraft;
  const customForm=state.showCustomForm
    ? `<div class="card" style="border-color:#c7d8f4;background:#f7fbff"><div class="k">新增自定义供应商（OpenAI 兼容协议 / Anthropic 协议）</div><div class="grid g2"><div><div class="hint">供应商名称</div><div class="input-wrap"><input value="${esc(d.name)}" oninput="setCustomDraft('name',this.value)" placeholder="例如：我的模型网关"></div></div><div><div class="hint">协议类型</div><div class="input-wrap"><select onchange="setCustomDraft('api',this.value)"><option value="openai-completions" ${d.api==="openai-completions"?"selected":""}>OpenAI 兼容协议</option><option value="anthropic" ${d.api==="anthropic"?"selected":""}>Anthropic 协议</option></select></div></div><div><div class="hint">Base URL</div><div class="input-wrap"><input class="mono" value="${esc(d.baseUrl)}" oninput="setCustomDraft('baseUrl',this.value)" placeholder="https://api.example.com/v1"></div></div><div><div class="hint">模型 ID</div><div class="input-wrap"><input class="mono" value="${esc(d.modelId)}" oninput="setCustomDraft('modelId',this.value)" placeholder="gpt-4o-mini"></div></div><div><div class="hint">模型显示名称（可选）</div><div class="input-wrap"><input value="${esc(d.modelName)}" oninput="setCustomDraft('modelName',this.value)" placeholder="我的模型"></div></div><div><div class="hint">环境变量名（可选）</div><div class="input-wrap"><input class="mono" value="${esc(d.envName)}" oninput="setCustomDraft('envName',this.value)" placeholder="MY_PROXY"></div></div></div><div class="grid g2"><div><div class="hint">上下文窗口</div><div class="input-wrap"><input class="mono" value="${esc(d.contextWindow)}" oninput="setCustomDraft('contextWindow',this.value)" placeholder="128000"></div></div><div><div class="hint">最大输出 tokens</div><div class="input-wrap"><input class="mono" value="${esc(d.maxTokens)}" oninput="setCustomDraft('maxTokens',this.value)" placeholder="8192"></div></div></div><div class="actions"><label class="hint"><input type="checkbox" ${d.reasoning?"checked":""} onchange="setCustomDraft('reasoning',this.checked)"> 该模型支持推理模式</label><div><button class="btn btn-ghost" onclick="toggleCustomForm(false)">取消</button><button class="btn btn-primary" onclick="saveCustomProvider()">保存并选中</button></div></div></div>`
    : `<button class="btn btn-ghost" onclick="toggleCustomForm(true)">添加自定义供应商</button>`;

  return `<div class="panel"><div class="title">模型提供方</div><p class="sub">可选择一个或多个模型提供方，支持新增自定义供应商。</p><div class="grid g2">${cards}</div><div class="actions">${customForm}<div><button class="btn btn-ghost" onclick="goStep(1)">上一步</button> <button class="btn btn-primary" onclick="goStep(3)" ${state.selectedProviders.length?"":"disabled"}>下一步</button></div></div></div>`;
}

function renderKeys(){
  const selected=state.selectedProviders.map(providerById).filter(Boolean);
  const needKeys=selected.filter(p=>!p.noKey);
  const noKey=selected.filter(p=>p.noKey);
  const cards=needKeys.map(p=>{
    const v=state.keyValidation[p.id]||{status:"idle",message:""};
    const cls=v.status==="pass"?"pass":v.status==="fail"?"fail":v.status==="loading"?"loading":"";
    const msg=v.status==="loading"?"正在校验密钥...":(v.message||"");
    const placeholder=p.placeholder||"sk-xxxxxxxxxxxxxxxx";
    return `<div class="card"><div class="row"><span class="k">${esc(p.name)}</span><button class="tiny-btn" onclick="openUrl('${p.keyUrl||""}')">获取 Key</button></div><div class="input-wrap"><input class="mono" type="password" id="key-${p.id}" value="${esc(state.apiKeys[p.id]||"")}" placeholder="${esc(placeholder)}" oninput="onKeyInput('${p.id}',this.value)"><button class="tiny-btn" onclick="toggleKeyMask('${p.id}',this)">显示</button><button class="tiny-btn" onclick="validateKey('${p.id}')">校验</button></div><div class="key-status ${cls}" id="status-${p.id}">${esc(msg)}</div></div>`;
  }).join("")||`<div class="card"><div class="sub">当前选择无需配置 API Key。</div></div>`;

  const noKeyCard=noKey.length?`<div class="card" style="border-color:#edd8aa;background:#fff9ed"><div class="k">无需 Key</div><div class="sub">${esc(noKey.map(x=>x.name).join("、"))} 将使用本地模式。</div></div>`:"";
  return `<div class="panel"><div class="title">API 密钥配置</div><p class="sub">必填密钥填写后即可进入下一步，建议点击“校验”确认可用性。</p><div class="grid">${cards}${noKeyCard}</div><div class="actions"><button class="btn btn-ghost" onclick="goStep(2)">上一步</button><button class="btn btn-primary" id="keyNextBtn" onclick="goStep(4)" ${canProceedFromKeys()?"":"disabled"}>下一步</button></div></div>`;
}

function renderChannels(){
  const cards=CHANNELS.map(c=>{
    const selected=state.selectedChannels.includes(c.id);
    const status=c.lock?"始终开启":selected?"已启用":"未启用";
    return `<div class="card ${c.lock?"":"clickable"} ${selected&&!c.lock?"selected":""}" onclick="${c.lock?"":`toggleChannel('${c.id}')`}"><div class="k">${esc(c.name)}</div><div class="sub">${esc(c.desc)}</div><div class="hint">${status}</div></div>`;
  }).join("");
  return `<div class="panel"><div class="title">通信渠道</div><p class="sub">Web 控制台默认可用，其它渠道可现在启用，也可安装后再配置。</p><div class="grid g3">${cards}</div><div class="actions"><button class="btn btn-ghost" onclick="goStep(3)">上一步</button><button class="btn btn-primary" onclick="prepareInstall()">开始安装</button></div></div>`;
}

function renderInstallPage(){
  const lines=state.installLogs.length?state.installLogs.map(lineHtml).join(""):`<div class="line" data-placeholder="1"><span class="time">${now()}</span><span class="prefix">...</span><span class="txt info">等待安装日志...</span></div>`;
  const canRetry=state.installLogs.some(x=>x.type==="error")&&!state.installRunning&&!state.installDone;
  return `<div class="panel"><div class="title">正在安装 OpenClaw</div><p class="sub">请勿关闭窗口。首次安装可能持续数分钟，程序会自动重试。</p><div class="progress-row"><div class="track"><div class="fill" id="installFill" style="width:${clamp(state.installProgress)}%"></div></div><span class="percent" id="installPct">${clamp(state.installProgress)}%</span></div><div class="terminal" id="installTerminal">${lines}</div><div class="actions"><span class="hint">控制台地址：<code>${DASHBOARD_URL}</code></span><button class="btn ${canRetry?"btn-primary":"btn-ghost"}" id="installActionBtn" ${canRetry?"":"disabled"} onclick="${canRetry?"retryInstall()":""}">${canRetry?"重试安装":state.installDone?"已完成":"安装中..."}</button></div></div>`;
}

function renderDone(){
  const uninstallRows=state.uninstallLogs.length?state.uninstallLogs.map(lineHtml).join(""):`<div class="line" data-uninstall-placeholder="1"><span class="time">${now()}</span><span class="prefix">...</span><span class="txt info">点击“卸载 OpenClaw”可执行卸载。</span></div>`;
  return `<div class="panel"><div class="ok-mark">OK</div><div class="title" style="text-align:center">安装完成</div><p class="sub" style="text-align:center">OpenClaw 已完成本地配置，你可以立即打开控制台，也可以执行卸载。</p><div class="grid g2"><div class="card"><div class="k">快速操作</div><div class="grid"><button class="btn btn-ghost" onclick="openUrl('${DASHBOARD_URL}')">打开控制台（127.0.0.1:18789）</button><button class="btn btn-ghost" onclick="copyDashboardUrl()">复制控制台地址</button></div><div class="k" style="margin-top:10px">常用命令</div><div class="terminal" style="max-height:none"><div class="line"><span class="time"></span><span class="prefix"></span><span class="txt info"><code>openclaw gateway run --allow-unconfigured</code></span></div><div class="line"><span class="time"></span><span class="prefix"></span><span class="txt info"><code>openclaw dashboard</code></span></div><div class="line"><span class="time"></span><span class="prefix"></span><span class="txt info"><code>openclaw doctor</code></span></div></div></div><div class="card"><div class="k">卸载 OpenClaw</div><p class="sub">会卸载全局 CLI，并删除 <code>~/.openclaw</code> 本地配置目录。</p><div class="terminal" id="uninstallTerminal">${uninstallRows}</div><div class="actions"><span class="hint" id="uninstallStatus">${state.uninstallDone?"卸载已完成":state.uninstallError?`卸载失败：${esc(state.uninstallError)}`:state.uninstallRunning?"正在卸载...":"准备就绪"}</span><button class="btn ${state.uninstallRunning?"btn-ghost":state.uninstallError?"btn-primary":"btn-ghost"}" id="uninstallActionBtn" onclick="runUninstall()">${state.uninstallRunning?"卸载中...":state.uninstallError?"重试卸载":"卸载 OpenClaw"}</button></div></div></div></div>`;
}
function goStep(n){state.step=Math.max(0,Math.min(STEPS.length-1,n));render()}

async function checkEnv(force=false){
  if(state.envLoading) return;
  if(!force&&state.envChecks.length) return;
  state.envLoading=true;render();
  try{
    state.envChecks=window.electronAPI?.checkEnvironment?await window.electronAPI.checkEnvironment():[{name:"环境检测",detail:"预览模式",status:"warn",hint:"当前运行在浏览器预览模式"}];
  }catch(e){state.envChecks=[{name:"环境检测",detail:"检测失败",status:"fail",hint:e.message||"未知错误"}]}
  state.envLoading=false;render();
}

function toggleProvider(id){
  const i=state.selectedProviders.indexOf(id);
  if(i>=0){if(state.selectedProviders.length===1)return;state.selectedProviders.splice(i,1);}else state.selectedProviders.push(id);
  render();
}

function toggleCustomForm(show){state.showCustomForm=Boolean(show);render()}
function setCustomDraft(field,value){state.customDraft[field]=value}

function saveCustomProvider(){
  const d=state.customDraft;
  const name=String(d.name||"").trim();
  const baseUrl=String(d.baseUrl||"").trim();
  const modelId=String(d.modelId||"").trim();
  if(!name||!baseUrl||!modelId){alert("请至少填写：供应商名称、Base URL、模型 ID");return;}

  const id=`custom_${Date.now()}`;
  const provider={
    id,isCustom:true,recommended:false,noKey:false,
    name,desc:`自定义供应商 (${d.api==="anthropic"?"Anthropic 协议":"OpenAI 兼容协议"})`,
    cost:"按你的网关计费",keyUrl:baseUrl,placeholder:"sk-xxxxxxxxxxxxxxxx",
    api:d.api==="anthropic"?"anthropic":"openai-completions",baseUrl,modelId,
    modelName:String(d.modelName||"").trim()||name,
    envName:String(d.envName||"").trim(),
    contextWindow:Number(d.contextWindow)>0?Number(d.contextWindow):128000,
    maxTokens:Number(d.maxTokens)>0?Number(d.maxTokens):8192,
    reasoning:Boolean(d.reasoning),
  };

  state.customProviders.push(provider);
  if(!state.selectedProviders.includes(id)) state.selectedProviders.push(id);
  state.apiKeys[id]=state.apiKeys[id]||"";
  state.showCustomForm=false;
  state.customDraft={name:"",baseUrl:"",modelId:"",modelName:"",api:"openai-completions",envName:"",contextWindow:"128000",maxTokens:"8192",reasoning:false};
  render();
}

function removeCustomProvider(id){
  state.customProviders=state.customProviders.filter(p=>p.id!==id);
  state.selectedProviders=state.selectedProviders.filter(x=>x!==id);
  delete state.apiKeys[id];
  delete state.keyValidation[id];
  render();
}

function canProceedFromKeys(){
  const required=state.selectedProviders.map(providerById).filter(p=>p&&!p.noKey).map(p=>p.id);
  return required.every(id=>String(state.apiKeys[id]||"").trim().length>0);
}

function onKeyInput(providerId,value){
  state.apiKeys[providerId]=value;
  state.keyValidation[providerId]={status:"idle",message:""};
  const statusEl=document.getElementById(`status-${providerId}`);
  if(statusEl){statusEl.className="key-status";statusEl.textContent="";}
  const nextBtn=document.getElementById("keyNextBtn");
  if(nextBtn) nextBtn.disabled=!canProceedFromKeys();
}

function toggleKeyMask(providerId,btn){
  const input=document.getElementById(`key-${providerId}`);
  if(!input) return;
  input.type=input.type==="password"?"text":"password";
  btn.textContent=input.type==="password"?"显示":"隐藏";
}

function setKeyStatus(providerId,status,message){
  state.keyValidation[providerId]={status,message};
  const statusEl=document.getElementById(`status-${providerId}`);
  if(!statusEl) return;
  statusEl.className=`key-status ${status}`;
  statusEl.textContent=message||"";
}

async function validateKey(providerId){
  const p=providerById(providerId);if(!p||p.noKey)return;
  const key=String(state.apiKeys[providerId]||"").trim();
  if(!key){setKeyStatus(providerId,"fail","请先输入 API 密钥。");return;}
  setKeyStatus(providerId,"loading","正在校验密钥...");

  try{
    if(window.electronAPI?.validateApiKey){
      const payload=p.isCustom
        ? {providerId:"custom",apiKey:key,customConfig:{baseUrl:p.baseUrl,api:p.api,modelId:p.modelId}}
        : {providerId,apiKey:key};
      const result=await window.electronAPI.validateApiKey(payload);
      setKeyStatus(providerId,result.valid?"pass":"fail",result.message||(result.valid?"校验通过。":"校验失败。"));
    }else{
      await sleep(800);
      setKeyStatus(providerId,key.length>8?"pass":"fail",key.length>8?"校验通过（预览）。":"校验失败（预览）。");
    }
  }catch(e){setKeyStatus(providerId,"fail",e.message||"校验发生错误。");}

  const nextBtn=document.getElementById("keyNextBtn");
  if(nextBtn) nextBtn.disabled=!canProceedFromKeys();
}

function toggleChannel(id){
  if(id==="webchat") return;
  const i=state.selectedChannels.indexOf(id);
  if(i>=0) state.selectedChannels.splice(i,1); else state.selectedChannels.push(id);
  render();
}

function prepareInstall(){
  state.installLogs=[];
  state.installProgress=0;
  state.installRunning=false;
  state.installDone=false;
  goStep(5);
}

function retryInstall(){
  if(state.installRunning) return;
  state.installLogs=[];
  state.installProgress=0;
  state.installRunning=false;
  state.installDone=false;
  render();
}
function appendInstallLog(log){
  if(!isInstallStep()) return;
  const term=document.getElementById("installTerminal"); if(!term) return;
  const ph=term.querySelector('[data-placeholder="1"]'); if(ph) ph.remove();
  term.insertAdjacentHTML("beforeend",lineHtml(log));
  while(term.children.length>600) term.removeChild(term.firstElementChild);
  term.scrollTop=term.scrollHeight;
}

function renderInstallFromState(){
  if(!isInstallStep()) return;
  const term=document.getElementById("installTerminal"); if(!term) return;
  term.innerHTML=state.installLogs.length
    ? state.installLogs.map(lineHtml).join("")
    : `<div class="line" data-placeholder="1"><span class="time">${now()}</span><span class="prefix">...</span><span class="txt info">等待安装日志...</span></div>`;
}

function updateInstallProgressUI(){
  if(!isInstallStep()) return;
  const p=clamp(state.installProgress);
  const fill=document.getElementById("installFill");
  const pct=document.getElementById("installPct");
  if(fill) fill.style.width=`${p}%`;
  if(pct) pct.textContent=`${p}%`;
}

function updateInstallActionUI(){
  if(!isInstallStep()) return;
  const btn=document.getElementById("installActionBtn"); if(!btn) return;
  const canRetry=state.installLogs.some(x=>x.type==="error")&&!state.installRunning&&!state.installDone;
  btn.className=`btn ${canRetry?"btn-primary":"btn-ghost"}`;
  btn.disabled=!canRetry;
  btn.textContent=canRetry?"重试安装":state.installDone?"已完成":"安装中...";
  btn.onclick=canRetry?retryInstall:null;
}

function pushInstallLog(text,type="info",prefix=">"){
  const item={time:now(),text,type,prefix};
  state.installLogs.push(item);
  if(state.installLogs.length>600) state.installLogs.shift();
  appendInstallLog(item);
  updateInstallActionUI();
}

function bumpInstallProgress(text){
  const t=String(text||"").toLowerCase();
  if(/(error|failed|exception)/.test(t)){state.installProgress=Math.max(state.installProgress,12);return;}
  if(/(ready|completed|success|完成|就绪)/.test(t)){state.installProgress=Math.max(state.installProgress,95);return;}
  state.installProgress=Math.min(92,state.installProgress+4);
}

async function startInstall(){
  if(state.installRunning) return;
  state.installRunning=true;
  state.installDone=false;
  pushInstallLog("开始执行安装流程...","info","...");
  state.installProgress=Math.max(state.installProgress,3);
  updateInstallProgressUI();
  updateInstallActionUI();

  let cleanup=null;
  try{
    if(window.electronAPI?.onInstallLog){
      cleanup=window.electronAPI.onInstallLog((msg)=>{
        pushInstallLog(msg.text||"",msg.type||"info",msg.prefix||">");
        bumpInstallProgress(msg.text||"");
        updateInstallProgressUI();
      });
    }

    if(window.electronAPI?.installOpenClaw){
      const result=await window.electronAPI.installOpenClaw({
        providers:state.selectedProviders,
        apiKeys:state.apiKeys,
        channels:state.selectedChannels,
        customProviders:selectedCustomProviders(),
      });
      if(!result||result.success===false) throw new Error(result?.error||"未知安装错误。");
      state.installProgress=100;
      state.installDone=true;
      state.installRunning=false;
      pushInstallLog("安装已完成。","success","OK");
      updateInstallProgressUI();
      updateInstallActionUI();
      setTimeout(()=>goStep(6),900);
    }else{
      const sim=[[300,"$ npm install -g openclaw@latest","info","$",8],[1200,"通过镜像源安装 OpenClaw...","info","...",24],[2200,"OpenClaw CLI 安装完成","success","OK",42],[3200,"写入 openclaw.json 和 .env","info","...",58],[4200,"启动 127.0.0.1:18789 网关","info","$",76],[5200,"控制台已就绪： http://127.0.0.1:18789","success","OK",95]];
      let prev=0;
      for(const row of sim){
        await sleep(Math.max(0,row[0]-prev));
        prev=row[0];
        pushInstallLog(row[1],row[2],row[3]);
        state.installProgress=row[4];
        updateInstallProgressUI();
      }
      state.installProgress=100;
      state.installDone=true;
      state.installRunning=false;
      updateInstallProgressUI();
      updateInstallActionUI();
      setTimeout(()=>goStep(6),900);
    }
  }catch(e){
    pushInstallLog(`安装失败：${e.message||"未知错误"}`,"error","ERR");
    state.installRunning=false;
    state.installDone=false;
    state.installProgress=Math.min(state.installProgress,96);
    updateInstallProgressUI();
    updateInstallActionUI();
  }finally{
    if(typeof cleanup==="function") cleanup();
  }
}

function renderUninstallFromState(){
  if(!isDoneStep()) return;
  const term=document.getElementById("uninstallTerminal"); if(!term) return;
  term.innerHTML=state.uninstallLogs.length
    ? state.uninstallLogs.map(lineHtml).join("")
    : `<div class="line" data-uninstall-placeholder="1"><span class="time">${now()}</span><span class="prefix">...</span><span class="txt info">点击“卸载 OpenClaw”可执行卸载。</span></div>`;
}

function appendUninstallLog(log){
  if(!isDoneStep()) return;
  const term=document.getElementById("uninstallTerminal"); if(!term) return;
  const ph=term.querySelector('[data-uninstall-placeholder="1"]'); if(ph) ph.remove();
  term.insertAdjacentHTML("beforeend",lineHtml(log));
  while(term.children.length>600) term.removeChild(term.firstElementChild);
  term.scrollTop=term.scrollHeight;
}

function updateUninstallActionUI(){
  if(!isDoneStep()) return;
  const btn=document.getElementById("uninstallActionBtn");
  const status=document.getElementById("uninstallStatus");
  if(btn){
    btn.className=`btn ${state.uninstallRunning?"btn-ghost":state.uninstallError?"btn-primary":"btn-ghost"}`;
    btn.disabled=state.uninstallRunning;
    btn.textContent=state.uninstallRunning?"卸载中...":state.uninstallError?"重试卸载":"卸载 OpenClaw";
  }
  if(status){
    status.textContent=state.uninstallDone
      ? "卸载已完成"
      : state.uninstallError
        ? `卸载失败：${state.uninstallError}`
        : state.uninstallRunning
          ? "正在卸载..."
          : "准备就绪";
  }
}

function pushUninstallLog(text,type="info",prefix=">"){
  const item={time:now(),text,type,prefix};
  state.uninstallLogs.push(item);
  if(state.uninstallLogs.length>600) state.uninstallLogs.shift();
  appendUninstallLog(item);
}

async function runUninstall(){
  if(state.uninstallRunning) return;
  if(!confirm("确认卸载 OpenClaw？将删除全局 CLI 和本地配置目录。")) return;

  state.uninstallRunning=true;
  state.uninstallDone=false;
  state.uninstallError="";
  state.uninstallLogs=[];
  render();

  let cleanup=null;
  try{
    if(window.electronAPI?.onInstallLog){
      cleanup=window.electronAPI.onInstallLog((msg)=>{pushUninstallLog(msg.text||"",msg.type||"info",msg.prefix||">");updateUninstallActionUI();});
    }
    if(window.electronAPI?.uninstallOpenClaw){
      const result=await window.electronAPI.uninstallOpenClaw();
      if(!result||result.success===false) throw new Error(result?.error||"未知卸载错误。");
      state.uninstallDone=true;
      state.uninstallError="";
    }else{
      await sleep(900);
      pushUninstallLog("预览模式：模拟卸载完成。","success","OK");
      state.uninstallDone=true;
    }
  }catch(e){
    state.uninstallDone=false;
    state.uninstallError=e.message||"未知错误";
  }finally{
    state.uninstallRunning=false;
    updateUninstallActionUI();
    if(typeof cleanup==="function") cleanup();
  }
}

function copyDashboardUrl(){if(navigator.clipboard?.writeText)navigator.clipboard.writeText(DASHBOARD_URL).catch(()=>{})}

render();
</script>
</body>
</html>
